        // متغيرات الحالة (State)
        let gameState = 'intro'; // intro, exam, result, answerKey
        let questions = [];
        let userAnswers = {};
        let score = 0;
        let highestScore = 0;

        // دالة خلط وتحديد 60 سؤال فقط
        function getRandomQuestions() {
            const shuffled = [...questionBank].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, 60);
        }

        // تحديث واجهة المستخدم بناءً على الحالة
        function render() {
            const mainContent = document.getElementById('main-content');
            const headerScore = document.getElementById('header-score');
            const headerHighestScore = document.getElementById('header-highest-score');

            // تحديث الهيدر
            if (highestScore > 0) {
                headerScore.classList.remove('hidden');
                headerHighestScore.innerText = highestScore;
            } else {
                headerScore.classList.add('hidden');
            }

            // تحديث المحتوى الرئيسي
            if (gameState === 'intro') {
                mainContent.innerHTML = renderIntro();
            } else if (gameState === 'exam') {
                mainContent.innerHTML = renderExam();
            } else if (gameState === 'result') {
                mainContent.innerHTML = renderResult();
            } else if (gameState === 'answerKey') {
                mainContent.innerHTML = renderAnswerKey();
            }

            // تفعيل أيقونات Lucide
            lucide.createIcons();
            window.scrollTo(0, 0);
        }

        function setGameState(state) {
            gameState = state;
            render();
        }

        function startExam() {
            questions = getRandomQuestions();
            userAnswers = {};
            score = 0;
            setGameState('exam');
        }

        function handleAnswerSelect(qIndex, optIndex) {
            userAnswers[qIndex] = optIndex;
            
            // تحديث تصميم الخيارات عبر الـ DOM لعدم عمل إعادة تحميل كاملة للشاشة وفقدان موقع التمرير (Scroll)
            const bubbleLabels = ['أ', 'ب', 'ج', 'د'];
            const labels = document.querySelectorAll(`label[data-qindex="${qIndex}"]`);
            
            labels.forEach((label, idx) => {
                const input = label.querySelector('input');
                const bubble = label.querySelector('.bubble');
                const text = label.querySelector('.opt-text');

                if (idx === optIndex) {
                    label.className = "flex items-center gap-4 p-4 rounded-xl cursor-pointer transition-all border-2 border-indigo-600 bg-indigo-50 shadow-md transform scale-[1.01]";
                    input.checked = true;
                    bubble.className = "bubble w-10 h-10 rounded-full border-2 flex items-center justify-center shrink-0 font-bold text-lg transition-colors shadow-sm bg-indigo-600 border-indigo-600 text-white";
                    text.className = "opt-text text-base font-semibold select-none text-indigo-900";
                } else {
                    label.className = "flex items-center gap-4 p-4 rounded-xl cursor-pointer transition-all border-2 border-slate-200 hover:border-indigo-300 hover:bg-slate-50";
                    input.checked = false;
                    bubble.className = "bubble w-10 h-10 rounded-full border-2 flex items-center justify-center shrink-0 font-bold text-lg transition-colors shadow-sm border-slate-300 text-slate-500 bg-white";
                    text.className = "opt-text text-base font-semibold select-none text-slate-700";
                }
            });

            // تحديث العداد
            document.getElementById('answered-count').innerText = Object.keys(userAnswers).length;
        }

        function submitExam() {
            if(Object.keys(userAnswers).length < 60) {
               if(!window.confirm('لم تقم بالإجابة على جميع الـ 60 سؤالاً، هل أنت متأكد من رغبتك في إنهاء الامتحان؟')) return;
            }
            let correctAnswers = 0;
            questions.forEach((q, index) => {
                if (userAnswers[index] === q.correct) correctAnswers++;
            });
            const finalPercentage = Math.round((correctAnswers / questions.length) * 100);
            score = finalPercentage;
            if (finalPercentage > highestScore) highestScore = finalPercentage;
            setGameState('result');
        }

        function viewAnswerKey() {
            if (highestScore >= 70) {
                setGameState('answerKey');
            } else {
                alert('عذراً، نموذج الإجابة مغلق 🔒. يجب أن تتخطى 70% على الأقل لفتح جزء من الإجابات!');
            }
        }

        // قوالب واجهة المستخدم
        function renderIntro() {
            return `
            <div class="flex flex-col items-center justify-center min-h-[75vh] text-center space-y-6 animate-fade-in">
                <div class="bg-indigo-100 p-6 rounded-full mb-4 shadow-xl border-4 border-indigo-50">
                    <i data-lucide="award" style="width: 80px; height: 80px;" class="text-indigo-600"></i>
                </div>
                <h1 class="text-5xl font-extrabold text-slate-800 tracking-tight">منصة <span class="text-indigo-600">لغتي العربية</span></h1>
                <p class="text-lg text-slate-600 max-w-2xl leading-relaxed mt-4">
                    تحدَّ نفسك في النحو الشامل للثانوية العامة! بنك أسئلة يحتوي على <span class="font-bold text-indigo-600">160 سؤالاً</span>، سيتم اختيار 60 منها عشوائياً في كل محاولة.
                    <br/><br/>
                    <span class="bg-amber-100 text-amber-800 px-3 py-1 rounded-md text-sm font-bold">تنبيه نظام الإجابات:</span> 
                    &nbsp;أقل من 70% (مغلق) 🔒 | 70% - 79% (يفتح 50%) 🔓 | 80%+ (يفتح بالكامل) ✅
                </p>
                <button onclick="startExam()" class="mt-8 px-12 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full font-bold text-xl shadow-xl hover:shadow-2xl transition-all transform hover:-translate-y-1 flex items-center gap-2">
                    ابدأ الامتحان الآن <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </button>
            </div>`;
        }

        function renderExam() {
            const bubbleLabels = ['أ', 'ب', 'ج', 'د'];
            let html = `
            <div class="max-w-4xl mx-auto w-full animate-fade-in">
                <div class="sticky top-[64px] bg-white/95 backdrop-blur-md z-10 py-4 mb-6 border-b border-slate-200 flex justify-between items-center px-6 rounded-b-2xl shadow-sm">
                    <h2 class="text-2xl font-bold text-slate-800">امتحان النحو الشامل</h2>
                    <div class="text-indigo-600 font-bold bg-indigo-50 px-5 py-2 rounded-full border border-indigo-100">
                        أجبت على: <span id="answered-count">${Object.keys(userAnswers).length}</span> / 60
                    </div>
                </div>
                <div class="space-y-6 px-2 pb-24">
            `;

            questions.forEach((q, qIndex) => {
                html += `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                    <h3 class="text-xl font-bold text-slate-800 mb-5 leading-relaxed flex items-start gap-3">
                        <span class="bg-indigo-100 text-indigo-700 w-9 h-9 rounded-full flex items-center justify-center shrink-0 text-base shadow-inner">
                            ${qIndex + 1}
                        </span>
                        <span class="mt-1">${q.q}</span>
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                `;
                q.options.forEach((opt, optIndex) => {
                    const isSelected = userAnswers[qIndex] === optIndex;
                    html += `
                        <label data-qindex="${qIndex}" onclick="handleAnswerSelect(${qIndex}, ${optIndex})" 
                               class="flex items-center gap-4 p-4 rounded-xl cursor-pointer transition-all border-2 ${isSelected ? 'border-indigo-600 bg-indigo-50 shadow-md transform scale-[1.01]' : 'border-slate-200 hover:border-indigo-300 hover:bg-slate-50'}">
                            <input type="radio" name="question-${qIndex}" class="sr-only" ${isSelected ? 'checked' : ''}>
                            <div class="bubble w-10 h-10 rounded-full border-2 flex items-center justify-center shrink-0 font-bold text-lg transition-colors shadow-sm ${isSelected ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300 text-slate-500 bg-white'}">
                                ${bubbleLabels[optIndex]}
                            </div>
                            <span class="opt-text text-base font-semibold select-none ${isSelected ? 'text-indigo-900' : 'text-slate-700'}">
                                ${opt}
                            </span>
                        </label>
                    `;
                });
                html += `</div></div>`;
            });

            html += `
                </div>
                <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 flex justify-center shadow-[0_-15px_40px_rgba(0,0,0,0.06)] z-20">
                    <button onclick="submitExam()" class="px-14 py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-full font-extrabold text-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 flex items-center gap-3">
                        <i data-lucide="check-circle" class="w-6 h-6"></i> إنهاء الامتحان واعتماد النتيجة
                    </button>
                </div>
            </div>`;
            return html;
        }

        function renderResult() {
            let statusText = "";
            let statusColor = "";
            let circleGradient = "";
            
            if (score >= 80) { 
                statusText = "ممتاز! تم فتح نموذج الإجابة بالكامل."; 
                statusColor = "text-emerald-600";
                circleGradient = `conic-gradient(#059669 ${score}%, #f1f5f9 ${score}%)`;
            } else if (score >= 70) { 
                statusText = "جيد جداً! تم فتح 50% من نموذج الإجابة."; 
                statusColor = "text-indigo-600";
                circleGradient = `conic-gradient(#4f46e5 ${score}%, #f1f5f9 ${score}%)`;
            } else { 
                statusText = "حاول مرة أخرى لتتخطى 70% وتفتح الإجابات."; 
                statusColor = "text-rose-600";
                circleGradient = `conic-gradient(#e11d48 ${score}%, #f1f5f9 ${score}%)`;
            }

            let btnClass = "";
            let btnIcon = "";
            let btnText = "";

            if (highestScore >= 80) {
                btnClass = 'bg-emerald-50 border-emerald-500 text-emerald-700 hover:bg-emerald-100';
                btnIcon = '<i data-lucide="unlock" class="w-5 h-5"></i>';
                btnText = "نموذج الإجابة الشامل";
            } else if (highestScore >= 70) {
                btnClass = 'bg-indigo-50 border-indigo-400 text-indigo-700 hover:bg-indigo-100';
                btnIcon = '<i data-lucide="unlock" class="w-5 h-5 opacity-70"></i>';
                btnText = "نموذج الإجابة (50%)";
            } else {
                btnClass = 'bg-slate-50 border-slate-200 text-slate-400 cursor-not-allowed';
                btnIcon = '<i data-lucide="lock" class="w-5 h-5"></i>';
                btnText = "نموذج الإجابة (مغلق)";
            }

            return `
            <div class="max-w-2xl mx-auto w-full pb-16 animate-fade-in mt-10">
                <div class="bg-white p-10 rounded-[2.5rem] shadow-xl text-center border border-slate-100">
                    <div class="inline-flex items-center justify-center w-40 h-40 rounded-full mb-8 shadow-inner relative"
                         style="background: ${circleGradient};">
                        <div class="absolute inset-3 bg-white rounded-full flex flex-col items-center justify-center shadow-sm">
                            <span class="text-5xl font-black ${statusColor}">
                                ${score}%
                            </span>
                        </div>
                    </div>
                    
                    <h2 class="text-3xl font-extrabold mb-3 ${statusColor}">${statusText}</h2>
                    <p class="text-slate-500 font-medium text-lg mb-10">أعلى نتيجة حققتها حتى الآن هي: <span class="font-bold text-slate-800">${highestScore}%</span></p>
                    
                    <div class="flex flex-col sm:flex-row justify-center gap-4 w-full">
                        <button onclick="startExam()" class="flex-1 py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-bold flex items-center justify-center gap-2 transition-colors shadow-md text-lg">
                            <i data-lucide="refresh-ccw" class="w-5 h-5"></i> امتحان جديد (60 سؤال)
                        </button>
                        
                        <button onclick="viewAnswerKey()" class="flex-1 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all border-2 text-lg shadow-sm ${btnClass}">
                            ${btnIcon} ${btnText}
                        </button>
                    </div>
                </div>
            </div>`;
        }

        function renderAnswerKey() {
            const displayCount = highestScore >= 80 ? 60 : (highestScore >= 70 ? 30 : 0);
            const displayedQuestions = questions.slice(0, displayCount);
            const bubbleLabels = ['أ', 'ب', 'ج', 'د'];
            
            let html = `
            <div class="max-w-4xl mx-auto w-full pb-16 animate-fade-in">
                <div class="rounded-3xl p-8 text-white mb-8 shadow-xl relative overflow-hidden mt-6 
                    ${highestScore >= 80 ? 'bg-gradient-to-l from-emerald-500 to-teal-600' : 'bg-gradient-to-l from-indigo-500 to-blue-600'}">
                    <i data-lucide="unlock" class="absolute -left-10 -top-10 text-white/10 w-64 h-64"></i>
                    <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-6">
                        <div>
                            <h2 class="text-3xl font-black mb-2 flex items-center gap-3">
                                <i data-lucide="award" class="w-8 h-8"></i> ${highestScore >= 80 ? "النموذج الشامل المفتوح" : "النموذج الجزئي (50%)"}
                            </h2>
                            <p class="text-white/90 text-lg font-medium">
                                ${highestScore >= 80 ? "أحسنت! صلاحية كاملة لرؤية جميع إجاباتك." : "تم فتح 30 سؤالاً فقط. اجتهد في المحاولة القادمة للوصول لـ 80% وفتح الباقي!"}
                            </p>
                        </div>
                        <button onclick="setGameState('result')" class="px-8 py-3 bg-white text-slate-800 hover:bg-slate-50 rounded-xl font-extrabold shadow-md transition-colors whitespace-nowrap">
                            العودة للنتيجة
                        </button>
                    </div>
                </div>
                <div class="space-y-6">
            `;

            displayedQuestions.forEach((q, qIndex) => {
                const userAnswer = userAnswers[qIndex];
                const isCorrect = userAnswer === q.correct;
                const isUnanswered = userAnswer === undefined;

                html += `
                <div class="p-6 rounded-2xl border-2 transition-colors ${isCorrect ? 'bg-emerald-50/40 border-emerald-200' : 'bg-rose-50/40 border-rose-200'}">
                    <div class="flex items-start gap-4 mb-5">
                        ${isCorrect 
                            ? `<i data-lucide="check-circle" class="text-emerald-500 shrink-0 mt-1 w-7 h-7"></i>` 
                            : `<i data-lucide="x-circle" class="text-rose-500 shrink-0 mt-1 w-7 h-7"></i>`
                        }
                        <h4 class="text-xl font-bold text-slate-800 leading-relaxed">
                            <span class="text-slate-400 mr-1 text-base">${qIndex + 1}.</span> ${q.q}
                        </h4>
                    </div>
                    <div class="mr-11 space-y-3 font-medium">
                `;

                if (!isCorrect && !isUnanswered) {
                    html += `
                        <div class="bg-rose-100 text-rose-900 p-4 rounded-xl border border-rose-200 flex items-start gap-4">
                            <span class="font-extrabold shrink-0 bg-rose-500 text-white w-9 h-9 flex items-center justify-center rounded-full text-base shadow-sm">
                                ${bubbleLabels[userAnswer]}
                            </span>
                            <div>
                                <div class="text-sm font-black text-rose-700 mb-1 tracking-wide">إجابتك (خاطئة) ❌</div>
                                <div class="text-lg">${q.options[userAnswer]}</div>
                            </div>
                        </div>
                    `;
                }

                if (isUnanswered) {
                    html += `
                        <div class="bg-slate-100 text-slate-600 p-4 rounded-xl flex items-center gap-3 border border-slate-200">
                            <i data-lucide="alert-circle" class="w-6 h-6 text-slate-400"></i> 
                            <span class="text-lg font-semibold">لم تقم بالإجابة على هذا السؤال.</span>
                        </div>
                    `;
                }

                html += `
                        <div class="p-4 rounded-xl flex items-start gap-4 border-2 ${isCorrect ? 'bg-emerald-100 border-emerald-300 text-emerald-900' : 'bg-emerald-50 border-emerald-400 text-emerald-900 shadow-sm mt-4 relative overflow-hidden'}">
                            ${!isCorrect ? '<div class="absolute top-0 right-0 w-2 h-full bg-emerald-500"></div>' : ''}
                            <span class="font-extrabold shrink-0 w-9 h-9 flex items-center justify-center rounded-full text-base shadow-sm ${isCorrect ? 'bg-emerald-600 text-white' : 'bg-emerald-500 text-white z-10'}">
                                ${bubbleLabels[q.correct]}
                            </span>
                            <div class="z-10">
                                <div class="text-sm font-black tracking-wide mb-1 ${isCorrect ? 'text-emerald-700' : 'text-emerald-800'}">
                                    ${isCorrect ? 'إجابتك صحيحة ✅' : 'التصحيح ✅'}
                                </div>
                                <div class="text-lg font-bold">${q.options[q.correct]}</div>
                            </div>
                        </div>
                    </div>
                </div>`;
            });

            html += `</div>`;

            if (highestScore >= 70 && highestScore < 80) {
                html += `
                <div class="mt-8 bg-slate-800 text-white p-6 rounded-2xl flex flex-col items-center justify-center text-center gap-3 shadow-lg">
                    <i data-lucide="lock" class="w-8 h-8 text-amber-400"></i>
                    <p class="text-lg font-bold">باقي الأسئلة الـ 30 مغلقة. ابدأ امتحاناً جديداً وحاول كسر حاجز الـ 80% لتفتحها جميعاً!</p>
                    <button onclick="startExam()" class="mt-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-black px-6 py-2 rounded-lg transition-colors">
                        تحدَّ نفسك الآن
                    </button>
                </div>`;
            }

            html += `</div>`;
            return html;
        }

        // تشغيل التطبيق مبدئياً
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });

    </script>
</body>
</html>
