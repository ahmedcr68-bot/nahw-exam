            { q: "ما وزن اسم الآلة «مجهر»؟", options: ["مَفْعَل", "مِفْعَل", "مَفْعُول", "مِفْعَال"], correct: 1, exp: "مِجْهَر على وزن مِفْعَل وهو من الأوزان القياسية القديمة." },
            { q: "ما أنواع أسماء الآلة: «سكين، شاكوش، محراث»؟", options: ["جامد، مشتق، مشتق", "مشتق، جامد، مشتق", "جامد، جامد، مشتق", "جامد، مشتق، جامد"], correct: 2, exp: "سكين وشاكوش أسماء آلة سماعية (جامدة لا فعل لها)، ومحراث مشتق من الفعل حَرَثَ." },
            { q: "على أي الأوزان يأتي مصدر الفعل «أهدى»؟", options: ["فِعْلَة", "تَفْعِلَة", "إفْعَال", "مُفَاعَلَة"], correct: 2, exp: "الفعل الرباعي على وزن (أَفْعَلَ) مصدره القياسي على وزن (إِفْعَال)، مثل أهدى: إهداء." },
            { q: "للفعل «قاتل» مصدران، فما هما؟", options: ["قِتَال، مُقَاتَلَة", "مُقَاتَلَة، تَقَاتُل", "قَتْل، تَقَاتُل", "قَتْل، قِتَال"], correct: 0, exp: "الفعل الرباعي على وزن (فَاعَلَ) مصدره يكون على وزن (فِعَال) أو (مُفَاعَلَة)، مثل: قاتل (قتال، مقاتلة)." },
            { q: "ما مصدر الفعل الخماسي «تَقَدَّمَ»؟", options: ["تَقْدِمَة", "تَقَدُّم", "تَقَادُم", "تَقْدِيم"], correct: 1, exp: "الفعل الخماسي المبدوء بتاء زائدة (تَفَعَّلَ) يكون مصدره بضم ما قبل آخره: تَقَدُّم." },
            { q: "أسفر الانفجاران عن خسائر. ما إعراب «الانفجاران»؟", options: ["نائب فاعل مرفوع", "فاعل مرفوع", "خبر مرفوع", "مبتدأ مؤخر مرفوع"], correct: 1, exp: "أسفر فعل ماض مبني للمعلوم، والانفجاران فاعل مرفوع وعلامة رفعه الألف لأنه مثنى." },
            { q: "ما الجملة التي تحوي مصدراً مؤولاً؟", options: ["تعجبني مقولة: إن الجمال جمال العلم", "أحرص على زيارة أقاربي", "سرني أنك ناجح في عملك", "إنما الآمال تتحقق بالعمل"], correct: 2, exp: "المصدر المؤول يتكون من (أن + اسمها + خبرها)، وفي الجملة: (أنك ناجح) والمصدر الصريح: سرني نجاحك." },
            { q: "عليك أن تُتقن عملك. ما المحل الإعرابي للمصدر المؤول؟", options: ["مبتدأ", "مفعول به", "فاعل", "اسم مجرور"], correct: 1, exp: "(عليك) اسم فعل أمر بمعنى (الزم)، والفاعل ضمير مستتر، والمصدر المؤول (أن تتقن) في محل نصب مفعول به." },
            { q: "كلا الطالبين ناجحان. إعراب كلمة «كلا»:", options: ["توكيد معنوي مرفوع", "مبتدأ مرفوع بالضمة المقدرة", "مبتدأ مرفوع بالألف", "خبر مرفوع"], correct: 1, exp: "(كلا) إذا أضيفت إلى اسم ظاهر تُعرب بحركات مقدرة وتلزم حالة الإفراد، فهنا هي مبتدأ مرفوع بالضمة المقدرة." },
            
            // --- الجزء الثاني (المبتدأ والخبر، النواسخ، والأفعال) ---
            { q: "«لولا الله ما اهتدينا». إعراب لفظ الجلالة «الله»:", options: ["مبتدأ خبره محذوف وجوباً", "مبتدأ خبره محذوف جوازاً", "فاعل مرفوع", "خبر لمبتدأ محذوف"], correct: 0, exp: "الاسم الواقع بعد (لولا) يُعرب مبتدأً خبره محذوف وجوباً تقديره (موجود)." },
            { q: "«في التأني السلامة». حكم تقديم الخبر على المبتدأ:", options: ["واجب", "جائز", "ممتنع", "قليل"], correct: 1, exp: "يُقدم الخبر جوازاً إذا كان شبه جملة والمبتدأ معرفة (السلامة)." },
            { q: "«في المحكمة قضاتها». حكم تقديم الخبر هنا:", options: ["جائز", "واجب", "ممتنع", "شاذ"], correct: 1, exp: "التقديم واجب لأن المبتدأ (قضاتها) اشتمل على ضمير يعود على بعض الخبر (المحكمة)." },
            { q: "«نعم الخلق الصدق». إعراب «الصدق» يجوز فيه:", options: ["مبتدأ مؤخر فقط", "خبر لمبتدأ محذوف فقط", "مبتدأ مؤخر أو خبر لمبتدأ محذوف", "فاعل مرفوع"], correct: 2, exp: "المخصوص بالمدح بعد (نعم وبئس) له إعرابان: إما مبتدأ مؤخر، أو خبر لمبتدأ محذوف تقديره (هو)." },
            { q: "«لعمرك إنهم لفي سكرتهم يعمهون». المحذوف في الجملة:", options: ["المبتدأ وجوباً", "الخبر وجوباً", "الفاعل", "الخبر جوازاً"], correct: 1, exp: "كلمة (عمرك) صريحة في القسم فتُعرب مبتدأ، وخبرها يكون محذوفاً وجوباً تقديره (قسمي)." },
            { q: "«عسى الكرب الذي أمسينا فيه أن يكون وراءه فرج». حكم اقتران خبر «عسى» بـ(أن):", options: ["يقل", "يكثر", "يجب", "يمتنع"], correct: 1, exp: "أفعال الرجاء (عسى وأوشك) (يكثر) اقتران خبرها بـ (أن)." },
            { q: "«أوشك القطار أن يصل». خبر أوشك هنا:", options: ["مفرد", "جملة فعلية", "شبه جملة", "جملة اسمية"], correct: 1, exp: "خبر أفعال المقاربة والرجاء والشروع يجب أن يكون دائماً جملة فعلية فعلها مضارع (أن يصل)." },
            { q: "«كاد المعلم أن يكون رسولا». كاد تدل على:", options: ["الرجاء", "الشروع", "المقاربة", "التمني"], correct: 2, exp: "الأفعال (كاد، كرَبَ، أوشك) تدل على المقاربة." },
            { q: "«أخذ الطالب يذاكر». إعراب «الطالب»:", options: ["فاعل", "اسم أخذ مرفوع", "مفعول به", "مبتدأ"], correct: 1, exp: "الفعل (أخذ) هنا من أفعال الشروع لأن خبره جملة فعلية فعلها مضارع (يذاكر)، فالطالب اسم أخذ." },
            { q: "«أخذ الطالب الكتاب». إعراب «الطالب»:", options: ["اسم أخذ مرفوع", "فاعل مرفوع", "مبتدأ", "خبر"], correct: 1, exp: "(أخذ) هنا فعل ماضٍ تام عادي (وليس ناقصاً من أفعال الشروع) لعدم وجود خبر جملة فعلية، فالطالب فاعل مرفوع." },
            { q: "«إنما المؤمنون إخوة». إعراب «المؤمنون»:", options: ["اسم إن منصوب", "مبتدأ مرفوع", "خبر مرفوع", "فاعل مرفوع"], correct: 1, exp: "إذا دخلت (ما) الكافة على (إن) فإنها تبطل عملها، ويعرب ما بعدها مبتدأ مرفوعاً." },
            { q: "أي الجمل الآتية بها «لا» النافية للجنس عاملة؟", options: ["لا بيننا خائن", "لا الطالب مهمل ولا الطالبة", "لا إله إلا الله", "بلا شك سننتصر"], correct: 2, exp: "في (لا إله إلا الله) توفرت شروط العمل: اسمها نكرة، غير مفصول عنها، ولم تُسبق بحرف جر." },
            { q: "«لا طالب علم مقصر». نوع اسم لا:", options: ["مفرد", "مضاف", "شبيه بالمضاف", "معرفة"], correct: 1, exp: "اسم لا هنا مضاف، لأنه مضاف إلى نكرة بعده (طالبِ علمٍ)." },
            { q: "«لا طالباً للعلم مقصر». اسم لا منصوب لأنه:", options: ["مضاف", "شبيه بالمضاف", "مفرد", "نكرة مقصودة"], correct: 1, exp: "اسم لا هنا جاء منوناً وبعده ما يُتمم معناه (للعلم/علمًا)، فهو شبيه بالمضاف ويكون منصوباً." },
            { q: "الفعل «يُسعى» عند صوغ اسم الفاعل منه يصبح:", options: ["مَسْعيّ", "مُسْعَى", "سَاعٍ", "مُسَاعٍ"], correct: 2, exp: "اسم الفاعل من الثلاثي (سعى) هو (ساعٍ) تحذف ياؤه في حالتي الرفع والجر إذا كان نكرة." },
            { q: "«كن جميلاً ترى الوجود جميلاً». إعراب «جميلاً» الأولى:", options: ["حال منصوبة", "خبر كان منصوب", "مفعول به", "نعت"], correct: 1, exp: "كن فعل أمر ناقص، واسمه ضمير مستتر وجوباً تقديره (أنت)، و(جميلاً) خبرها المنصوب." },
            { q: "«ظننتك فاهماً الدرس». المفعولان في الجملة هما:", options: ["التاء، فاهماً", "الكاف، فاهماً", "فاهماً، الدرس", "ظن، الكاف"], correct: 1, exp: "(ظن) تنصب مفعولين، المفعول الأول هو الضمير المتصل (الكاف)، والمفعول الثاني (فاهماً)." },
            { q: "«والله لأذاكرن دروسي». الفعل المضارع هنا:", options: ["مرفوع", "منصوب", "مجزوم", "مبني على الفتح"], correct: 3, exp: "الفعل المضارع إذا اتصلت به نون التوكيد اتصالاً مباشراً يُبنى على الفتح." },
            { q: "«الطالبات يذاكرن بجد». المضارع «يذاكرن» مبني على:", options: ["الفتح", "السكون", "الضم", "الكسر"], correct: 1, exp: "الفعل المضارع إذا اتصلت به نون النسوة يُبنى على السكون." },
            { q: "«متى تسعَ في الخير تنل محبة الناس». علامة جزم الفعلين:", options: ["حذف حرف العلة، السكون", "حذف حرف العلة، حذف النون", "السكون، السكون", "السكون، حذف حرف العلة"], correct: 0, exp: "فعل الشرط (تسعَ) مجزوم بحذف حرف العلة، وجواب الشرط (تنل) مجزوم بالسكون (وحذفت الألف من وسطه لمنع التقاء الساكنين)." },
            
            // --- الجزء الثالث (المصادر والمشتقات والإعراب) ---
            { q: "أي الجمل الآتية تحتوي على مصدر صناعي؟", options: ["الوطنية شعور جميل", "هذه فتاة مصرية", "التربية السليمة أساس النجاح", "الأعمال اليدوية متقنة"], correct: 0, exp: "المصدر الصناعي اسم ينتهي بياء مشددة وتاء مربوطة زائدتين (الوطنية) ولا يُعرب نعتاً. في الجملة 2 و 4 تعرب نعتاً فهي اسم منسوب." },
            { q: "«التربية» مصدر لفعل:", options: ["ثلاثي", "رباعي", "خماسي", "سداسي"], correct: 1, exp: "التربية مصدر للفعل الرباعي (رَبَّى - تَرْبِيَة) على وزن (تَفْعِلَة)." },
            { q: "المصدر الميمي من الفعل «وعد»:", options: ["مَوْعِد", "مَوْعَد", "مِيعَاد", "مُوَاعَدَة"], correct: 0, exp: "الفعل المثال الواوي (وعد) مصدره الميمي يأتي على وزن (مَفْعِل) بكسر العين: (مَوْعِد)." },
            { q: "«مستقبل الضيوف في الصباح». نوع المشتق «مستقبل»:", options: ["اسم فاعل", "اسم زمان", "اسم مكان", "مصدر ميمي"], correct: 1, exp: "دلت الكلمة على زمان الاستقبال بسبب قرينة (في الصباح)، فهي اسم زمان." },
            { q: "المصدر الصريح للفعل «استفاد»:", options: ["إفادة", "استفادة", "مفيدة", "استيفاد"], correct: 1, exp: "الفعل السداسي المعتل ما قبل الآخر (استفاد) مصدره بزيادة تاء مربوطة في آخره (استفادة)." },
            { q: "أي الجمل الآتية تحوي اسم تفضيل؟", options: ["ما أحسن السماء!", "محمد أحسن من أحمد", "أحسنْ إلى الناس", "أحسن الرجل عمله"], correct: 1, exp: "في جملة (محمد أحسن) أحسن اسم مشتق للدلالة على المفاضلة، أما في بقية الجمل فهو إما فعل تعجب أو فعل أمر أو ماضٍ." },
            { q: "«الطلاب كلاهما مجتهد». هذه الجملة:", options: ["صحيحة نحوياً", "خاطئة، الصواب: كلاهما مجتهدان", "خاطئة، الصواب: الطالبان كلاهما مجتهد", "صحيحة لأن كلاهما توكيد"], correct: 2, exp: "(كلاهما) للمثنى، و(الطلاب) جمع، لذا فالصياغة خاطئة. الصواب: الطالبان كلاهما مجتهد (كلاهما مبتدأ ثان) أو الطالبان كلاهما مجتهدان (كلاهما توكيد)." },
            { q: "«احرصوا على الموت توهب لكم الحياة». إعراب «توهب»:", options: ["مرفوع وعلامة رفعه الضمة", "منصوب بعد فاء السببية", "مجزوم في جواب الطلب", "مبني على السكون"], correct: 2, exp: "الفعل المضارع (توهب) وقع في جواب الطلب (الأمر: احرصوا) وهو أمر محبب، فهو مجزوم." },
            { q: "«يا طالباً، اجتهد». نوع المنادى:", options: ["نكرة غير مقصودة", "نكرة مقصودة", "مضاف", "شبيه بالمضاف"], correct: 0, exp: "المنادى جاء كلمة واحدة منونة بالنصب (طالباً)، فهو نكرة غير مقصودة." },
            { q: "«يا محمدون، اجتهدوا». إعراب «محمدون»:", options: ["منادى منصوب بالفتحة", "منادى مبني على الواو في محل نصب", "منادى مرفوع بالواو", "مبتدأ مرفوع"], correct: 1, exp: "المنادى العلم المفرد يُبنى على ما يُرفع به، و(محمدون) جمع مذكر سالم يُرفع بالواو، فهو مبني على الواو في محل نصب." },
            { q: "«كم من بطل ضحى من أجل الوطن». نوع كم:", options: ["استفهامية", "خبرية", "تعجبية", "موصولة"], correct: 1, exp: "إذا جاء بعد (كم) حرف الجر (من) وتمييزها مفرد أو جمع مجرور، فهي (كم) الخبرية للدلالة على الكثرة." },
            { q: "تمييز «كم» الاستفهامية يكون:", options: ["مفرداً مجروراً", "جمعاً مجروراً", "مفرداً منصوباً", "مرفوعاً"], correct: 2, exp: "تمييز كم الاستفهامية يكون دائماً مفرداً منصوباً (مثل: كم طالباً؟)، إلا إذا سُبقت كم بحرف جر فيجوز جره." },
            { q: "قرأت «11» قصة. التمييز الصحيح هو:", options: ["إحدى عشرة قصةً", "أحد عشر قصةً", "إحدى عشر قصةً", "إحدى عشرة قصصٍ"], correct: 0, exp: "العدد (11) يطابق المعدود تذكيراً وتأنيثاً في الجزأين. المعدود (قصة) مؤنث، فالعدد يكون (إحدى عشرة)." },
            { q: "عندي «15» كتاباً. الكتابة الصحيحة للرقم:", options: ["خمسة عشر", "خمس عشرة", "خمسة عشرة", "خمس عشر"], correct: 0, exp: "العدد من 13 إلى 19: الجزء الأول يخالف المعدود والثاني يطابقه. (كتاب) مذكر، إذن: (خمسة) مؤنث، و(عشر) مذكر." },
            { q: "اشترك في المسابقة «22» طالباً. الكتابة الصحيحة:", options: ["اثنان وعشرون", "اثنين وعشرين", "اثنتان وعشرون", "اثنتين وعشرين"], correct: 0, exp: "الرقم 2 يطابق المعدود (طالباً مذكر = اثنان). والعدد مرفوع لأنه فاعل (اشترك اثنان)، لذا نقول: اثنان وعشرون." },
            { q: "«بئس صفةً الكذب». إعراب «صفةً»:", options: ["فاعل", "مفعول به", "تمييز", "حال"], correct: 2, exp: "النكرة المنصوبة الواقعة بعد (نعم وبئس) تُعرب دائماً تمييزاً منصوباً، والفاعل يكون ضميراً مستتراً." },
            { q: "الاسم المنقوص من بين الكلمات الآتية:", options: ["القاضي", "الهدى", "مصطفى", "السماء"], correct: 0, exp: "الاسم المنقوص هو كل اسم معرب ينتهي بياء لازمة مكسور ما قبلها، مثل (القاضي)." },
            { q: "تثنية كلمة «العصا»:", options: ["العصيان", "العصوان", "العصاءان", "العصاتان"], correct: 1, exp: "الألف المقصورة (العصا) ثالثة ومكتوبة ألفاً قائمة، فأصلها واو. عند التثنية تُرد لأصلها وتُضاف علامة التثنية: العَصَوَان." },
            { q: "تثنية كلمة «صحراء»:", options: ["صحراءان", "صحراوان", "صحرايات", "صحاري"], correct: 1, exp: "الهمزة في (صحراء) مزيدة للتأنيث، وعند التثنية أو الجمع تقلب الهمزة المزيدة للتأنيث واواً دائماً: صحراوان." },
            { q: "«إنما يتذكر أولو الألباب». كلمة «أولو»:", options: ["جمع مذكر سالم", "ملحق بجمع المذكر السالم", "جمع تكسير", "اسم إشارة"], correct: 1, exp: "كلمة (أولو) لا مفرد لها من لفظها، وتُعرب إعراب جمع المذكر السالم، فهي ملحقة به." },
            { q: "من الملحقات بالمثنى كلمة:", options: ["عالمون", "أولات", "كلا (مضافة لضمير)", "سنون"], correct: 2, exp: "(كلا وكلتا) تُلحقان بالمثنى في الإعراب بشرط إضافتهما إلى ضمير (كلاهما، كلتاهما)." },
            { q: "«لا تقصر في عملك فتندم». الفاء هنا:", options: ["فاء العطف", "فاء السببية", "فاء الجزاء", "فاء الاستئناف"], correct: 1, exp: "الفاء هنا سُبقت بطلب (نهي: لا تقصر) وتنصب الفعل المضارع بعدها، فهي فاء السببية." },
            { q: "«إن تذاكر فسوف تنجح». سبب اقتران جواب الشرط بالفاء:", options: ["جملة اسمية", "جملة طلبية", "مسبوقة بـ (سوف)", "فعلها جامد"], correct: 2, exp: "جواب الشرط يقترن بالفاء (فاء الجزاء) وجوباً إذا كان مسبوقاً بـ (سوف) (اسمية طلبية وبجامد وبما ولن وقد وبالتسويف)." },
            { q: "«من يجتهد فالنجاح حليفه». سبب الاقتران بالفاء:", options: ["جملة فعلية", "جملة اسمية", "فعلها طلبي", "مسبوقة بقد"], correct: 1, exp: "جواب الشرط (النجاح حليفه) يتكون من مبتدأ وخبر، فهو جملة اسمية ولذلك اقترن بالفاء وجوباً." },
            { q: "الفعل المضارع ينصب إذا سُبق بـ:", options: ["لم", "لا الناهية", "كي", "إن"], correct: 2, exp: "(كي) من أدوات نصب الفعل المضارع. بينما لم ولا الناهية وإن أدوات جزم وشرط." },
            { q: "«ما كان المسلم ليكذب». اللام هنا:", options: ["لام التعليل", "لام الجحود", "لام الأمر", "لام القسم"], correct: 1, exp: "اللام المسبوقة بكون منفي (ما كان، لم يكن) هي لام الجحود التي تنصب الفعل المضارع." },
            { q: "«لتكتبن الدرس يا علي». حكم توكيد الفعل بالنون:", options: ["واجب", "جائز", "ممتنع", "شاذ"], correct: 1, exp: "الفعل المضارع دل على طلب (مسبوق بلام الأمر: لتكتبن)، فيجوز توكيده بالنون ويجوز عدم توكيده (لتكتبْ)." },
            { q: "«والله لسوف أنجح». حكم التوكيد بالنون:", options: ["واجب", "جائز", "ممتنع (لوجود فاصل)", "ممتنع (لأنه منفي)"], correct: 2, exp: "امتنع التوكيد بالنون بسبب وجود فاصل (سوف) بين اللام (لام القسم) والفعل المضارع (أنجح)." },
            { q: "المصدر المؤول في «يسرني أن تنجح» في محل:", options: ["نصب مفعول به", "رفع فاعل", "جر مضاف إليه", "رفع مبتدأ"], correct: 1, exp: "ياء المتكلم في (يسرني) مفعول به، والمصدر المؤول (أن تنجح = نجاحُك) هو الفاعل المرفوع المؤخر." },
            { q: "«استيقظت وطلوع الشمس». الواو هنا:", options: ["واو العطف", "واو الحال", "واو المعية", "واو القسم"], correct: 2, exp: "الواو هنا بمعنى (مع)، وما بعدها لا يشارك ما قبلها في الفعل (الشمس لا تستيقظ)، فهي واو المعية." },
            
            // --- الجزء الرابع (تكملة المنهج) ---
            { q: "إعراب كلمة «طلوع» في (استيقظت وطلوع الشمس):", options: ["مفعول به منصوب", "مفعول معه منصوب", "حال منصوبة", "مبتدأ مرفوع"], correct: 1, exp: "الاسم الواقع بعد واو المعية يُعرب دائماً (مفعولاً معه منصوباً)." },
            { q: "«ذاكرت والضوء خافت». الواو هنا:", options: ["واو العطف", "واو المعية", "واو الحال", "واو الاستئناف"], correct: 2, exp: "الواو هنا دخلت على جملة اسمية (الضوء خافت) تبين هيئة وحال حدوث الفعل، فهي واو الحال." },
            { q: "«احترم الناس خصوصاً العلماء». إعراب «العلماء»:", options: ["مضاف إليه", "مفعول به", "بدل", "نعت"], correct: 1, exp: "الاسم الواقع بعد كلمة (خصوصاً) يُعرب دائماً مفعولاً به لفعل محذوف تقديره (أخص)." },
            { q: "«أحب الطلاب وبخاصة المتفوقون». إعراب «المتفوقون»:", options: ["مبتدأ مؤخر مرفوع", "مفعول به منصوب", "مضاف إليه", "فاعل مرفوع"], correct: 0, exp: "شبه الجملة (بخاصة) تعرب خبراً مقدماً، وما بعدها (المتفوقون) يعرب دائماً مبتدأً مؤخراً مرفوعاً." },
            { q: "المستثنى بـ (غير) أو (سوى) يعرب دائماً:", options: ["مستثنى منصوب", "بدل", "مضاف إليه مجرور", "فاعل"], correct: 2, exp: "القاعدة الثابتة: أي اسم يقع بعد (غير) أو (سوى) يُعرب مضافاً إليه مجروراً." },
            { q: "«ما حضر الطلاب إلا طالبٌ». إعراب «طالب»:", options: ["مستثنى منصوب فقط", "مضاف إليه", "مستثنى منصوب أو بدل مرفوع", "فاعل مرفوع"], correct: 2, exp: "الكلام تام منفي (المستثنى منه موجود، وسبق بنفي)، فيجوز إعرابه مستثنى منصوباً أو بدلاً من الفاعل المرفوع." },
            { q: "«ما حضر إلا طالب». إعراب «طالب»:", options: ["بدل مرفوع", "مستثنى منصوب", "فاعل مرفوع", "مضاف إليه"], correct: 2, exp: "الكلام ناقص منفي (نحذف ما وإلا لنجد المعنى مستقيماً: حضر طالب)، فيُعرب حسب موقعه في الجملة: فاعل مرفوع." },
            { q: "أي الكلمات الآتية ممنوعة من الصرف لسبب واحد؟", options: ["أحمد", "مساجد", "عمر", "عطشان"], correct: 1, exp: "مساجد صيغة منتهى الجموع تمنع من الصرف لعلة واحدة (سبب واحد). البقية تمنع لعلتين (عالم+وزن فعل، عالم+عدل، صفة+فعلان)." },
            { q: "أي الكلمات ممنوعة من الصرف لسببين (عَلَم وأعجمي)؟", options: ["إبراهيم", "مكة", "صحراء", "مبادئ"], correct: 0, exp: "إبراهيم اسم عَلَم أعجمي (غير عربي)، ولذلك مُنع من الصرف لعلتين." },
            { q: "الممنوع من الصرف يُجر بـ:", options: ["الكسرة دائماً", "الفتحة إذا كان مجرداً من (أل) والإضافة", "الفتحة دائماً", "الياء"], correct: 1, exp: "القاعدة العامة: يُجر بالفتحة نيابة عن الكسرة بشرط ألا يكون مقترناً بـ (أل) وألا يضاف إلى ما بعده." },
            { q: "«صليت في مساجدَ كثيرة». إعراب مساجد:", options: ["اسم مجرور بالكسرة", "اسم مجرور بالفتحة", "مضاف إليه", "ظرف مكان"], correct: 1, exp: "مساجد ممنوع من الصرف (صيغة منتهى الجموع)، وجاء نكرة غير مضاف، فيُجر بالفتحة نيابة عن الكسرة." },
            { q: "«صليت في المساجدِ الأثرية». إعراب المساجد:", options: ["اسم مجرور بالفتحة", "اسم مجرور بالكسرة", "بدل مجرور", "مفعول به"], correct: 1, exp: "الممنوع من الصرف إذا اقترن بـ (أل) يُجر بالكسرة كبقية الأسماء المنصرفة." },
            { q: "«هذا طالب أخلاقه كريمة». الجملة (أخلاقه كريمة) في محل:", options: ["نصب حال", "رفع نعت", "رفع خبر ثانٍ", "جر مضاف إليه"], correct: 1, exp: "الجمل بعد النكرات صفات. (طالب) اسم نكرة مرفوع (خبر)، فالجملة الاسمية بعده في محل رفع نعت." },
            { q: "«رأيت الطالب يبتسم». الجملة (يبتسم) في محل:", options: ["رفع نعت", "نصب حال", "نصب مفعول به", "جر مضاف إليه"], correct: 1, exp: "الجمل بعد المعارف أحوال. (الطالب) معرفة، فالجملة الفعلية (يبتسم) في محل نصب حال." },
            { q: "الجمل بعد المعارف أحوال، وبعد النكرات:", options: ["أخبار", "صفات (نعوت)", "أحوال أيضاً", "مضاف إليه"], correct: 1, exp: "القاعدة الذهبية في النحو: الجمل وأشباه الجمل بعد النكرات صفات، وبعد المعارف أحوال." },
            { q: "«سرني ما فعلت». «ما» هنا:", options: ["نافية", "استفهامية", "موصولة", "تعجبية"], correct: 2, exp: "(ما) هنا بمعنى (الذي) أي: سرني الذي فعلته، فهي اسم موصول مبني." },
            { q: "«بئس ما تتصف به الكذب». فاعل بئس هنا هو:", options: ["ضمير مستتر", "الكذب", "الاسم الموصول (ما)", "التاء"], correct: 2, exp: "في أسلوب الذم (بئس)، الفاعل هنا هو (ما) الموصولة لغير العاقل." },
            { q: "«نِعْمَ رجلاً المخلص». فاعل نعم هو:", options: ["رجلاً", "المخلص", "ضمير مستتر", "محذوف"], correct: 2, exp: "إذا جاء بعد نعم وبئس اسم نكرة منصوب (تمييز)، يكون الفاعل ضميراً مستتراً يفسره التمييز." },
            { q: "حبذا الأمانة. إعراب الأمانة:", options: ["مبتدأ مؤخر وجوباً", "مبتدأ مؤخر جوازاً", "خبر لمبتدأ محذوف", "فاعل مرفوع"], correct: 0, exp: "المخصوص بالمدح بعد (حبذا) يُعرب دائماً مبتدأً مؤخراً وجوباً (لا يصح أن يتقدم أبداً)." },
            { q: "لا حبذا الخيانة. المخصوص بالذم لا يجوز أن يتقدم على (حبذا).", options: ["العبارة صحيحة", "العبارة خاطئة", "يجوز في حالة واحدة", "لا توجد إجابة"], correct: 0, exp: "العبارة صحيحة تماماً؛ لأن المخصوص بالمدح أو الذم مع (حبذا ولا حبذا) حكم تأخيره واجب." },
            { q: "«نحن -العرب- نكرم الضيف». إعراب «العرب»:", options: ["مبتدأ ثانٍ", "خبر", "مفعول به لفعل محذوف تقديره أخص", "نعت"], correct: 2, exp: "هذا أسلوب اختصاص، والاسم المختص (العرب) يُعرب مفعولاً به لفعل محذوف وجوباً تقديره أخص أو أعني." },
            { q: "أسلوب الاختصاص يبدأ بـ:", options: ["أداة نداء", "أداة تعجب", "أداة استفهام", "ضمير متكلم أو مخاطب"], correct: 3, exp: "يُبنى أسلوب الاختصاص على وجود ضمير للمتكلم غالباً (نحن، أنا) أو للمخاطب (أنتم، بك)، يليه الاسم المختص لتوضيحه." },
            { q: "«أعظم بالصدق». الباء في (بالصدق):", options: ["حرف جر أصلي", "حرف جر زائد", "حرف جر شبيه بالزائد", "حرف عطف"], correct: 1, exp: "الباء الواقعة في فاعل فعل التعجب في صيغة (أفْعِل بـ) هي دائماً حرف جر زائد وجوباً." },
            { q: "إعراب «الصدق» في (أعظم بالصدق):", options: ["فاعل مجرور لفظاً مرفوع محلاً", "مفعول به", "اسم مجرور", "مبتدأ"], correct: 0, exp: "في صيغة (أفعل بـ)، الاسم الذي يتصل بالباء الزائدة يعرب فاعلاً، ولكنه مجرور في اللفظ مرفوع في المحل." },
            { q: "«ما أعظم الصدق». إعراب «الصدق»:", options: ["فاعل", "مبتدأ", "مفعول به منصوب", "خبر"], correct: 2, exp: "في صيغة التعجب (ما أفعلَ)، المُتَعجَب منه يُعرب دائماً مفعولاً به منصوباً." },
            { q: "كلمة (أعظم) في التعجب (ما أعظم الصدق) هي:", options: ["اسم تفضيل", "فعل ماضٍ جامد", "فعل مضارع", "فعل أمر"], correct: 1, exp: "(أعظم) في صيغة (ما أفعل) تُعرب فعلاً ماضياً مبنياً على الفتح لإنشاء التعجب، والفاعل ضمير مستتر." },
            { q: "اسم الفعل (هيهات) معناه:", options: ["افترق", "بَعُدَ", "اسكت", "أتضجر"], correct: 1, exp: "(هيهات) اسم فعل ماضٍ قياسي سُمع عن العرب بمعنى (بَعُدَ بُعداً شديداً)." },
            { q: "اسم الفعل (أفٍ) معناه:", options: ["أتضجر", "أتوجع", "أعجب", "أستجيب"], correct: 0, exp: "(أُفٍّ) اسم فعل مضارع بمعنى أتضجر." },
            { q: "اسم الفعل (آمين) نوعه:", options: ["اسم فعل ماض", "اسم فعل مضارع", "اسم فعل أمر", "ليس اسم فعل"], correct: 2, exp: "(آمين) اسم فعل أمر سماعي بمعنى (استجب)." },
            { q: "اسم الفعل (شتان) نوعه:", options: ["اسم فعل ماض", "اسم فعل أمر", "اسم فعل مضارع", "حرف جر"], correct: 0, exp: "(شتان) اسم فعل ماض بمعنى (افترق افتراقاً شديداً)." },
            { q: "كلمة «يوم» تعرب ظرف زمان منصوب في:", options: ["يومُ الجمعة مبارك", "سأسافر يومَ الخميس", "جاء يومُ النصر", "هذا يومُ عظيم"], correct: 1, exp: "الظرف يدل على زمان وقوع الفعل (متى تسافر؟ يوم الخميس)، أما في البقية فقد أُعربت حسب موقعها (مبتدأ، فاعل، خبر) لأن الظروف متصرفة." },
            { q: "«حضر الطالبان كلاهما». إذا أردنا جعل (كلاهما) فاعلاً نقول:", options: ["الطالبان كلاهما حضرا", "حضر كلاهما الطالبان", "حضر كلا الطالبين", "كلا الطالبين حضرا"], correct: 2, exp: "لتكون (كلا) فاعلاً يجب ألا تتصل بضمير بل تضاف إلى اسم ظاهر بعدها يعرب مضافاً إليه، فنقول: حضر كلا الطالبين." },
            { q: "«كلا الطالبين ناجح». إعراب «كلا»:", options: ["مبتدأ مرفوع بالضمة المقدرة", "مبتدأ مرفوع بالألف", "توكيد معنوي مرفوع", "مضاف إليه"], correct: 0, exp: "إذا أضيفت كلا وكلتا لاسم ظاهر، تُعربان إعراب الاسم المقصور بحركات مقدرة للتعذر. هنا هي مبتدأ مرفوع بالضمة المقدرة." },
            { q: "نائب الفاعل في جملة «شُوهِدَت المباراة»:", options: ["التاء", "ضمير مستتر", "المباراة", "محذوف"], correct: 2, exp: "الفعل (شوهد) مبني للمجهول، والتاء للتأنيث حرف مبني لا محل له، والاسم المرفوع بعده (المباراة) هو نائب الفاعل." },
            { q: "«مُنِح المتفوق جائزة». إعراب (جائزة):", options: ["نائب فاعل", "مفعول به ثانٍ منصوب", "حال", "تمييز"], correct: 1, exp: "الفعل (مَنَح) ينصب مفعولين. عند بنائه للمجهول، أصبح المفعول الأول (المتفوق) نائب فاعل، ويبقى الثاني (جائزة) مفعولاً به ثانياً كما هو." },
            { q: "عند بناء الفعل (قال) للمجهول يصبح:", options: ["يُقال", "قِيلَ", "قَوْلٌ", "قَوَلَ"], correct: 1, exp: "الفعل الماضي الثلاثي الأجوف (وسطه ألف) عند بنائه للمجهول تُكسر فاؤه وتُقلب ألفه ياءً: قِيلَ، بِيعَ، صِيمَ." },
            { q: "عند بناء الفعل (باع) للمجهول يصبح:", options: ["بِيعَ", "يُبَاع", "بُوعَ", "بِيعَت"], correct: 0, exp: "كالفعل (قال)، الفعل الثلاثي الأجوف (باع) يُبنى للمجهول بكسر الحرف الأول وقلب الألف إلى ياء لتصبح (بِيعَ)." },
            { q: "الفعل الذي يلزم البناء للمجهول لفظاً لا معنى:", options: ["شُرِبَ", "فُهِمَ", "حُمَّ", "أُكِلَ"], correct: 2, exp: "من الأفعال التي تلازم صيغة المبني للمجهول لفظاً لكن معناها معلوم: حُمَّ (أصابته الحمى)، جُنَّ، غُمَّ، فُلِجَ." },
            { q: "الاسم المرفوع بعد الأفعال (حُمَّ، جُنَّ، غُمَّ) يُعرب:", options: ["نائب فاعل", "فاعلاً", "مبتدأ", "مفعولاً به"], correct: 1, exp: "لأن هذه الأفعال مبنية للمجهول في اللفظ فقط ولكنها مبنية للمعلوم في المعنى، لذلك ما بعدها يُعرب فاعلاً وليس نائب فاعل." },
            { q: "الاسم المرفوع بعد الأفعال (تُوفِّيَ، اسْتُشْهِدَ) يُعرب:", options: ["فاعلاً", "مبتدأ", "نائب فاعل", "خبراً"], correct: 2, exp: "على عكس (حُم وجُن)، الأفعال توفي واحتضر واستشهد تُبنى للمجهول حقيقةً، وما بعدها يُعرب نائب فاعل." },
            { q: "«كم كتاباً قرأت؟». نوع كم:", options: ["خبرية", "استفهامية", "تعجبية", "موصولة"], correct: 1, exp: "تمييز كم هنا جاء مفرداً منصوباً (كتاباً)، وعلامة الترقيم تدل على السؤال، فهي (كم الاستفهامية)." },
            { q: "«طابت الإسكندرية هواءً». إعراب هواءً:", options: ["حال", "مفعول لأجله", "تمييز منصوب", "مفعول به"], correct: 2, exp: "الاسم النكرة المنصوب بعد أفعال معينة (طاب، كفى، ازداد، امتلأ) يُعرب تمييزاً ملحوظاً محولاً عن الفاعل (طاب هواءُ الإسكندرية)." },
            { q: "«ازداد المسلم إيماناً». إعراب إيماناً:", options: ["مفعول به", "مفعول مطلق", "حال", "تمييز ملحوظ"], correct: 3, exp: "كالمثال السابق، النكرة المنصوبة بعد الفعل (ازداد) تُعرب تمييزاً ملحوظاً." },
            { q: "الاسم الممدود من بين الكلمات الآتية:", options: ["دعاء", "يسعى", "هدى", "مصطفى"], correct: 0, exp: "الاسم الممدود هو كل اسم معرب آخره همزة قبلها ألف زائدة مثل: سماء، دعاء، صحراء." },

            { q: "الفعل المضارع المعتل الآخر يجزم بـ:", options: ["السكون", "حذف حرف العلة", "حذف النون", "الفتحة"], correct: 1, exp: "يُجزم الفعل المضارع المعتل الآخر (بالألف أو الواو أو الياء) بحذف حرف العلة من آخره، مثل: لم يسعَ، لم يدعُ، لم يرمِ." }
        ];

        // متغيرات الحالة (State)
        let gameState = 'intro'; // intro, exam, result, answerKey
        let questions = [];
        let userAnswers = {};
        let score = 0;
        let highestScore = 0;

        // دالة خلط وتحديد 60 سؤال فقط
        function getRandomQuestions() {
            const shuffled = [...questionBank].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, 60);
        }

        // تحديث واجهة المستخدم بناءً على الحالة الحالية
        function render() {
            const mainContent = document.getElementById('main-content');
            const headerScore = document.getElementById('header-score');
            const headerHighestScore = document.getElementById('header-highest-score');

            // تحديث الهيدر (إظهار أعلى نتيجة)
            if (highestScore > 0) {
                headerScore.classList.remove('hidden');
                headerHighestScore.innerText = highestScore;
            } else {
                headerScore.classList.add('hidden');
            }

            // تحديث المحتوى الرئيسي
            if (gameState === 'intro') {
                mainContent.innerHTML = renderIntro();
            } else if (gameState === 'exam') {
                mainContent.innerHTML = renderExam();
            } else if (gameState === 'result') {
                mainContent.innerHTML = renderResult();
            } else if (gameState === 'answerKey') {
                mainContent.innerHTML = renderAnswerKey();
            }

            // تفعيل أيقونات Lucide بعد كل تحديث لـ DOM
            lucide.createIcons();
            window.scrollTo(0, 0);
        }

        function setGameState(state) {
            gameState = state;
            render();
        }

        function startExam() {
            questions = getRandomQuestions();
            userAnswers = {};
            score = 0;
            setGameState('exam');
        }

        function handleAnswerSelect(qIndex, optIndex) {
            userAnswers[qIndex] = optIndex;
            
            // تحديث تصميم الخيارات عبر الـ DOM مباشرة لعدم فقدان موقع التمرير
            const bubbleLabels = ['أ', 'ب', 'ج', 'د'];
            const labels = document.querySelectorAll(`label[data-qindex="${qIndex}"]`);
            
            labels.forEach((label, idx) => {
                const input = label.querySelector('input');
                const bubble = label.querySelector('.bubble');
                const text = label.querySelector('.opt-text');

                if (idx === optIndex) {
                    label.className = "flex items-center gap-4 p-4 rounded-xl cursor-pointer transition-all border-2 border-indigo-600 bg-indigo-50 shadow-md transform scale-[1.01]";
                    input.checked = true;
                    bubble.className = "bubble w-10 h-10 rounded-full border-2 flex items-center justify-center shrink-0 font-bold text-lg transition-colors shadow-sm bg-indigo-600 border-indigo-600 text-white";
                    text.className = "opt-text text-base font-semibold select-none text-indigo-900";
                } else {
                    label.className = "flex items-center gap-4 p-4 rounded-xl cursor-pointer transition-all border-2 border-slate-200 hover:border-indigo-300 hover:bg-slate-50";
                    input.checked = false;
                    bubble.className = "bubble w-10 h-10 rounded-full border-2 flex items-center justify-center shrink-0 font-bold text-lg transition-colors shadow-sm border-slate-300 text-slate-500 bg-white";
                    text.className = "opt-text text-base font-semibold select-none text-slate-700";
                }
            });

            // تحديث عداد الأسئلة المجابة
            document.getElementById('answered-count').innerText = Object.keys(userAnswers).length;
        }

        function submitExam() {
            if(Object.keys(userAnswers).length < 60) {
               if(!window.confirm('لم تقم بالإجابة على جميع الـ 60 سؤالاً، هل أنت متأكد من رغبتك في إنهاء الامتحان؟')) return;
            }
            let correctAnswers = 0;
            questions.forEach((q, index) => {
                if (userAnswers[index] === q.correct) correctAnswers++;
            });
            const finalPercentage = Math.round((correctAnswers / questions.length) * 100);
            score = finalPercentage;
            if (finalPercentage > highestScore) highestScore = finalPercentage;
            setGameState('result');
        }

        function viewAnswerKey() {
            if (highestScore >= 70) {
                setGameState('answerKey');
            } else {
                alert('عذراً، نموذج الإجابة مغلق 🔒. يجب أن تتخطى 70% على الأقل لفتح جزء من الإجابات!');
            }
        }

        // ==========================================
        // قوالب واجهة المستخدم (HTML Templates)
        // ==========================================

            return `
            <div class="flex flex-col items-center justify-center min-h-[75vh] text-center space-y-6 animate-fade-in">

            let html = `

                            <input type="radio" name="question-${q
